name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Check formatting
        run: npm run format:check

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Run tests
        run: npm test

  commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Merge-commit strategy (no rebase): every branch commit lands on main, so
      # lint them all. Merge commits are ignored by commitlint's defaults.
      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

      # A Conventional-Commit PR title would be copied into the merge-commit body
      # by GitHub, duplicating a branch commit in history/changelog. Reject it so
      # PR titles stay plain and descriptive.
      #
      # Exempt the release-please bot PR (branch `release-please--*`): it is
      # squash-merged (so the merge-body duplication does not apply) and its title
      # is intentionally `chore(main): release X`. Guarding only this step (not the
      # whole job) keeps the commit-lint step running, so the `commits` check still
      # reports a real success and stays safe to add as a required check.
      - name: Ensure PR title is NOT a conventional commit
        if: ${{ !startsWith(github.head_ref, 'release-please--') }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -qiE '^(feat|fix|perf|chore|refactor|docs|test|build|ci|style|revert)(\([^)]+\))?!?:'; then
            echo "::error::PR title '$PR_TITLE' is a Conventional Commit."
            echo "With merge commits, the PR title becomes the merge-commit body, duplicating a branch commit in history/changelog."
            echo "Use a plain descriptive PR title (no 'type:' prefix)."
            exit 1
          fi
          echo "PR title OK."

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Conventional Commits drive versioning: feat -> minor, fix -> patch. Each push
  # to main opens/updates a release PR; merging that PR cuts the GitHub release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # Mint a short-lived installation token from our GitHub App. The App's
      # private key never expires, so (unlike a fine-grained PAT) there's nothing
      # to renew on a schedule. Requires repo secrets RELEASE_PLEASE_APP_ID and
      # RELEASE_PLEASE_APP_PRIVATE_KEY; the App needs Contents + Pull requests +
      # Issues (read/write) and must be installed on this repo.
      - name: Mint a GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@v4
        with:
          # App token => the release PR is authored by the App bot, not
          # github-actions[bot]. That removes the "approve workflows to run" gate
          # and lets CI run on the release PR automatically.
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # If release-please left an open release PR, turn on GitHub native
      # auto-merge. Branch protection on main requires the CI checks (format,
      # validate, test), so GitHub holds the merge until they pass. We use the
      # App token (not GITHUB_TOKEN) so that when auto-merge finally lands the
      # PR, the resulting push to main re-triggers this workflow and cuts the
      # release. Idempotent: re-enabling on an already-armed PR is a no-op.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.rp.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_PR: ${{ steps.rp.outputs.pr }}
        run: |
          pr_number=$(echo "$RELEASE_PR" | jq -r '.number')
          gh pr merge "$pr_number" --auto --squash --repo "${{ github.repository }}"

  # Only after a release is actually created: build the Windows installer and
  # upload it (plus the electron-updater metadata) to that release. Runs on
  # windows-latest because electron-builder targets NSIS. We build with
  # `--publish never` (electron-builder still emits latest.yml) and upload via
  # gh, so release-please stays the sole owner of the release.
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      # Source maps are uploaded to Sentry during the build (only when the auth
      # token is present) and deleted before packaging, so they never ship. org
      # and project come from secrets so the Sentry org slug stays out of the repo.
      - name: Build renderer/main/preload
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Package Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload installer + update metadata to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/*.exe dist/latest.yml dist/*.blockmap --clobber

  # Cosmetic, last, and isolated: flip the release to prerelease if the merged
  # release PR carried the `prerelease` label. `needs: [release-please, build]`
  # means it runs only after the assets are safely uploaded, so a hiccup here can
  # never cost us the release artifacts. Uses --repo, so gh needs no checkout/git
  # context. GITHUB_TOKEN already has contents + PR write from the top-level
  # permissions block, and github.sha is the release PR's merge commit, which
  # resolves back to that PR and its labels.
  prerelease:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as prerelease if labeled
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labels=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[].labels[].name')
          if echo "$labels" | grep -qx 'prerelease'; then
            echo "Found 'prerelease' label -> marking ${{ needs.release-please.outputs.tag_name }} as prerelease"
            gh release edit "${{ needs.release-please.outputs.tag_name }}" --prerelease --repo "${{ github.repository }}"
          else
            echo "No 'prerelease' label -> leaving ${{ needs.release-please.outputs.tag_name }} as a full release"
          fi

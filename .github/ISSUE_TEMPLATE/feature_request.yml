name: Feature Request
description: Suggest a new feature or enhancement for Findias.
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Tell us what you'd like and why it would help.
  - type: textarea
    id: feature
    attributes:
      label: What would you like?
      description: Describe the feature or enhancement you have in mind.
      placeholder: I'd like Findias to...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: What are you trying to do, and how would this feature help?
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Tip: you can attach screenshots or mockups by dragging files into any text area above.
